version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 3
    reviewers:
      - 'nickliffen'
    groups:
      dependencies:
        patterns:
          - '*'
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    cooldown:
      default-days: 3
    reviewers:
      - 'nickliffen'
    groups:
      dependencies:
        patterns:
          - '*'
